# Render Blueprint — https://github.com/Alvaromp3/graceland_soccer
# New → Blueprint → connect this repo → Render reads render.yaml from the root.
#
# Set in the Render dashboard after first deploy:
#   Backend:  ALLOWED_ORIGINS (optional; Render sets RENDER=true → *.onrender.com CORS unless ALLOW_ORIGIN_REGEX=0)
#             OPEN_ROUTER_API_KEY, API_KEY (optional). ALLOW_ORIGIN_REGEX=0 to disable default Render regex.
#   Frontend: VITE_API_BASE_URL (rebuild static site after changing)

services:
  - type: web
    name: graceland-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DISABLE_MODEL_TRAINING
        value: "1"
      - key: DISABLE_DESTRUCTIVE_DATA_ENDPOINTS
        value: "1"
      - key: ENVIRONMENT
        value: production
      - key: PERSIST_DATA
        value: "1"
      - key: RESET_DATA_ON_START
        value: "0"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPEN_ROUTER_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      # Optional. Leave unset to use backend/data_store on the instance disk.
      # If set to a path without a Render Disk mounted there, startup could fail before these code fixes.
      - key: DATA_STORE_DIR
        sync: false

  - type: web
    name: graceland-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_API_KEY
        sync: false
